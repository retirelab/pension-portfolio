<body class="bg-slate-50">
  <div id="root"></div>

  <!-- React 앱 코드 (Babel 모듈 사용) -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo } from "https://esm.sh/react@18.2.0";
    import { createRoot } from "https://esm.sh/react-dom@18.2.0/client";
    import {
      TrendingUp, Calendar, AlertTriangle, CheckCircle2, DollarSign,
      LayoutDashboard, List, Plus, Trash2, RefreshCw, Wallet, Calculator,
      Info, ChevronDown, X, Settings, Download, Upload, PieChart, Coins,
      Archive, ShieldCheck, BarChart3, User, ArrowUp, ArrowDown, SlidersHorizontal
    } from "https://esm.sh/lucide-react@0.292.0";

    const fmt = (n) => {
      const num = Number(n);
      return Number.isFinite(num) ? num.toLocaleString("ko-KR") : "0";
    };

    const DEFAULT_COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#f43f5e', '#8b5cf6', '#06b6d4', '#ec4899'];

    // 혼합 자산군 관리용 상수
    const MIXED_ASSET_CATEGORIES = ["주식+채권"];

    // 공통 자산군 프리셋 목록
    const ASSET_PRESETS = [
      { label: "국내주식", color: "#6366f1" }, { label: "미국주식", color: "#3b82f6" },
      { label: "중국주식", color: "#ef4444" }, { label: "선진국주식", color: "#0ea5e9" }, 
      { label: "신흥국주식", color: "#f97316" }, { label: "주식+채권", color: "#a855f7" }, 
      { label: "미국채권", color: "#8b5cf6" }, { label: "국내채권", color: "#10b981" }, 
      { label: "글로벌채권", color: "#14b8a6" },
      { label: "금", color: "#f59e0b" }, { label: "원자재", color: "#d97706" },
      { label: "리츠(부동산)", color: "#ec4899" }, { label: "현금/단기채", color: "#94a3b8" },
      { label: "직접입력", color: "#64748b" },
    ];

    // 자산군-유형 자동 매핑 상수
    const CATEGORY_ASSET_TYPE = {
      "국내주식":    "위험자산",
      "미국주식":    "위험자산",
      "중국주식":    "위험자산",
      "선진국주식":  "위험자산",
      "신흥국주식":  "위험자산",
      "금":          "위험자산",
      "원자재":      "위험자산",
      "리츠(부동산)":"위험자산",
      "미국채권":    "안전자산",
      "국내채권":    "안전자산",
      "글로벌채권":  "안전자산",
      "현금/단기채": "안전자산",
    };

    const PENSION1_DEFAULT_TARGET = [
      { name: "S&P500", value: 24, color: "#3b82f6" }, { name: "나스닥", value: 9, color: "#14b8a6" },
      { name: "CSI300", value: 13, color: "#ef4444" }, { name: "한국200", value: 8, color: "#6366f1" },
      { name: "미국채", value: 12, color: "#8b5cf6" }, { name: "국고채", value: 12, color: "#10b981" },
      { name: "금", value: 22, color: "#f59e0b" },
    ];

    const createDefaultDcIrp = () => ({
      limit: 0, color: "#f97316", label: "퇴직IRP (DC형)",
      rebalanceMonth: 7, rebalanceDay: 15, monthlyInput: 200000,
      employerMonthlyInput: 300000, accountKind: "dc", taxCreditEligible: false,
      targetPortfolio: [
        { name: "미국주식", value: 40, color: "#3b82f6" },
        { name: "주식+채권", value: 30, color: "#a855f7" },
        { name: "현금/단기채", value: 30, color: "#94a3b8" }
      ],
      assets: [
        { id: 1, category: "미국주식",   name: "KODEX 미국나스닥100",        code: "379810", quantity: 66,  price: 21100, currentPrice: 23855, assetType: "위험자산" },
        { id: 2, category: "주식+채권",  name: "TIGER 미국나스닥100채권혼합Fn", code: "435420", quantity: 45,  price: 12000, currentPrice: 13130, stockRatio: 40 },
        { id: 3, category: "현금/단기채",name: "TIGER 단기채권액티브",       code: "157450", quantity: 60,  price: 10200, currentPrice: 10250, assetType: "안전자산", parkingAsset: true },
      ], 
      contributions: [
        { id: 1, month: "2026-01", amount: 300000, type: "회사부담금", memo: "정기 회사부담금" },
        { id: 2, month: "2026-02", amount: 300000, type: "회사부담금", memo: "정기 회사부담금" },
        { id: 3, month: "2026-03", amount: 200000, type: "개인추가납입", memo: "개인 추가 납입" }
      ], 
      pastContributions: [
        { id: 1, year: 2024, amount: 3600000, dividend: 50000 }, 
        { id: 2, year: 2025, amount: 3600000, dividend: 120000 }
      ]
    });

    const normalizeAccounts = (raw) => {
      const next = { ...raw };
      if (!next.dcIrp) {
        next.dcIrp = createDefaultDcIrp();
      } else {
        next.dcIrp = { ...createDefaultDcIrp(), ...next.dcIrp };
      }
      
      Object.keys(next).forEach(accKey => {
        if (next[accKey].assets) {
          next[accKey].assets = next[accKey].assets.map(asset => {
            const updated = { ...asset };
            if (updated.parkingAsset === undefined) {
              updated.parkingAsset = false;
            }
            if (MIXED_ASSET_CATEGORIES.includes(updated.category) && updated.stockRatio === undefined) {
              updated.stockRatio = 30;
            }
            return updated;
          });
        }
      });
      
      return next;
    };

    // 파킹형 자산 및 분리 계산용 Helper 함수
    const isParkingAsset = (a) => Boolean(a.parkingAsset);
    const getAssetMarketValue = (a) => (Number(a.quantity) || 0) * (Number(a.currentPrice || a.price) || 0);
    const getParkingAssetValue = (assets) => assets.filter(isParkingAsset).reduce((sum, a) => sum + getAssetMarketValue(a), 0);
    const getAllocationAssets = (assets) => assets.filter(a => !isParkingAsset(a));
    const getAllocationBaseValue = (assets) => getAllocationAssets(assets).reduce((sum, a) => sum + getAssetMarketValue(a), 0);

    const getRiskWeight = (a) => {
      if (MIXED_ASSET_CATEGORIES.includes(a.category)) {
        return (a.stockRatio ?? 30) / 100;
      }
      if (a.assetType === "위험자산") return 1.0;
      return 0.0;
    };

    const getEquityExposureWeight = (a) => {
      if (MIXED_ASSET_CATEGORIES.includes(a.category)) {
        return (a.stockRatio ?? 30) / 100;
      }
      if (a.assetType === "위험자산") return 1.0;
      return 0.0;
    };

    function Tip({ text }) {
      const [show, setShow] = useState(false);
      const ref = useRef(null);

      useEffect(() => {
        if (!show) return;
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setShow(false); };
        document.addEventListener("mousedown", handler);
        document.addEventListener("touchstart", handler);
        return () => { document.removeEventListener("mousedown", handler); document.removeEventListener("touchstart", handler); };
      }, [show]);

      return (
        <div className="relative inline-flex items-center" ref={ref}>
          <button
            type="button"
            onClick={(e) => { e.stopPropagation(); setShow(s => !s); }}
            className="w-[18px] h-[18px] rounded-full bg-slate-200 text-slate-500 text-[10px] font-black flex items-center justify-center hover:bg-indigo-100 hover:text-indigo-600 transition-colors flex-shrink-0 leading-none"
          >?</button>
          {show && (
            <div className="absolute left-0 top-6 z-[60] w-60 bg-slate-900 text-white text-[11px] font-medium leading-relaxed rounded-2xl p-3.5 shadow-2xl border border-slate-700 whitespace-pre-wrap">
              <div className="absolute -top-1.5 left-3.5 w-3 h-3 bg-slate-900 rotate-45 border-l border-t border-slate-700" />
              {text}
            </div>
          )}
        </div>
      );
    }

    function DonutChart({ data, title, subtitle, centerLabel = "총 비중" }) {
      let cum = 0;
      const rawTotal = data.reduce((s, d) => s + (Number(d.value) || 0), 0);
      const normalizeFactor = rawTotal > 0 ? 100 / rawTotal : 1;

      return (
        <div className="flex flex-col items-center bg-white p-5 rounded-2xl border border-slate-200 shadow-sm w-full">
          <p className="text-sm font-bold text-slate-800">{title}</p>
          <p className="text-xs text-slate-400 mt-0.5 mb-4">{subtitle}</p>
          <div className="relative w-40 h-40 sm:w-48 sm:h-48">
            <svg viewBox="0 0 40 40" className="-rotate-90 w-full h-full">
              {data.map((s, i) => {
                const rawVal = Number(s.value) || 0;
                const val = rawVal * normalizeFactor; 
                const da = `${val} ${100 - val}`;
                const offset = 100 - cum;
                cum += val;
                return (
                  <circle key={i} cx="20" cy="20" r="15.92" fill="transparent"
                    stroke={s.color} strokeWidth="5.5"
                    strokeDasharray={da} strokeDashoffset={offset}
                    className="transition-all duration-500 ease-in-out" />
                );
              })}
            </svg>
            <div className="absolute inset-0 flex flex-col items-center justify-center">
              <span className="text-[10px] text-slate-400 font-semibold">{centerLabel}</span>
              <span className="text-xl font-black text-slate-800">{Math.round(rawTotal)}%</span>
            </div>
          </div>
          <div className="mt-4 w-full flex flex-wrap justify-center gap-1.5">
            {data.map((s, i) => (
              <span key={i} className="flex items-center text-[11px] bg-slate-50 border border-slate-100 px-2.5 py-1 rounded-full font-semibold text-slate-700">
                <span className="w-2 h-2 rounded-full mr-1.5 flex-shrink-0" style={{ background: s.color }}></span>
                {s.name} <span className="ml-1 font-bold text-slate-500">{s.value}%</span>
              </span>
            ))}
          </div>
        </div>
      );
    }

    function ReturnBadge({ amount, rate, size = "sm" }) {
      const pos = amount > 0, neg = amount < 0;
      const color = pos ? "text-rose-500" : neg ? "text-blue-500" : "text-slate-400";
      return (
        <div className={`text-right ${size === "lg" ? "text-base" : "text-xs"}`}>
          <span className={`font-black ${color}`}>{pos ? "+" : ""}{fmt(amount)}원</span>
          <span className={`ml-1 font-bold opacity-80 ${color}`}>({pos ? "▲" : neg ? "▼" : ""}{Math.abs(rate || 0).toFixed(2)}%)</span>
        </div>
      );
    }

    function TargetCategorySelector({ t, i, curAcc, updateAcc }) {
      const [showDropdown, setShowDropdown] = useState(false);
      const [customMode, setCustomMode] = useState(false);
      const ref = useRef(null);

      useEffect(() => {
        if (!showDropdown) return;
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setShowDropdown(false); };
        document.addEventListener("mousedown", handler);
        document.addEventListener("touchstart", handler);
        return () => { document.removeEventListener("mousedown", handler); document.removeEventListener("touchstart", handler); };
      }, [showDropdown]);

      const handleChange = (newName, newColor) => {
        const oldName = t.name;
        updateAcc({
          targetPortfolio: curAcc.targetPortfolio.map((item, idx) => idx === i ? { ...item, name: newName, color: newColor || item.color } : item),
          assets: curAcc.assets.map(a => a.category === oldName ? { ...a, category: newName } : a)
        });
      };

      if (customMode) {
        return (
          <input type="text" value={t.name} autoFocus
            onChange={e => handleChange(e.target.value, t.color)}
            onBlur={() => setCustomMode(false)}
            className="w-full bg-transparent text-[10px] font-bold text-slate-700 outline-none border-b border-slate-200 focus:border-slate-400 py-0.5" 
          />
        );
      }

      return (
        <div className="relative w-full" ref={ref}>
          <button type="button" onClick={() => setShowDropdown(!showDropdown)} className="w-full bg-transparent text-[10px] font-bold text-slate-700 outline-none border-b border-slate-200 focus:border-slate-400 py-0.5 text-left flex justify-between items-center">
            <span className="truncate pr-1">{t.name || "자산군 선택"}</span>
            <ChevronDown size={12} className={`flex-shrink-0 transition-transform duration-200 ${showDropdown ? 'rotate-180 text-slate-700' : 'text-slate-400'}`} />
          </button>
          {showDropdown && (
            <div className="absolute top-full left-0 mt-1 w-40 bg-white border border-slate-200 rounded-xl shadow-xl z-[60] overflow-hidden">
              <div className="p-1 flex flex-col max-h-48 overflow-y-auto scrollbar-hide">
                {ASSET_PRESETS.map(preset => (
                  <button key={preset.label} type="button" onClick={() => {
                    if (preset.label === "직접입력") {
                      setCustomMode(true);
                      setShowDropdown(false);
                    } else {
                      handleChange(preset.label, preset.color);
                      setShowDropdown(false);
                    }
                  }} className={`flex items-center gap-2 w-full px-3 py-2 rounded-lg text-[11px] font-bold text-left transition-colors ${preset.label === "직접입력" ? "text-slate-400 border-t border-slate-100 mt-1 pt-2 justify-center" : "hover:bg-slate-50 text-slate-700"}`}>
                    {preset.label !== "직접입력" && <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background: preset.color}}></span>}
                    {preset.label}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    function AssetCategorySelector({ asset, curAcc, updateAcc, chAsset, showMsg, inpBase }) {
      const [showPreset, setShowPreset] = useState(false);
      const [customMode, setCustomMode] = useState(false);
      const ref = useRef(null);

      useEffect(() => {
        if (!showPreset) return;
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setShowPreset(false); };
        document.addEventListener("mousedown", handler);
        document.addEventListener("touchstart", handler);
        return () => { document.removeEventListener("mousedown", handler); document.removeEventListener("touchstart", handler); };
      }, [showPreset]);

      const handleSelect = (preset) => {
        if (preset.label === "직접입력") { setCustomMode(true); setShowPreset(false); return; }
        
        const updates = { category: preset.label };

        if (CATEGORY_ASSET_TYPE[preset.label]) {
          updates.assetType = CATEGORY_ASSET_TYPE[preset.label];
        }
        if (MIXED_ASSET_CATEGORIES.includes(preset.label) && asset.stockRatio === undefined) {
          updates.stockRatio = 30;
        }
        
        const isExist = curAcc.targetPortfolio.some(
          t => t.name.trim().toLowerCase() === preset.label.toLowerCase()
        );

        updateAcc({
          assets: curAcc.assets.map(a => a.id === asset.id ? { ...a, ...updates } : a),
          ...(isExist ? {} : {
            targetPortfolio: [...curAcc.targetPortfolio, { name: preset.label, value: 0, color: preset.color }]
          })
        });

        if (!isExist) showMsg("success", `"${preset.label}" 자산군이 목표 비중에 자동 등록되었습니다.`);
        setShowPreset(false);
        setCustomMode(false);
      };

      if (customMode) {
        return (
          <div className="space-y-1">
            <input type="text" value={asset.category || ""} autoFocus
              onChange={e => chAsset(asset.id, "category", e.target.value)}
              onBlur={e => {
                const val = e.target.value.trim();
                if (val) {
                  const updates = { category: val };
                  if (CATEGORY_ASSET_TYPE[val]) {
                    updates.assetType = CATEGORY_ASSET_TYPE[val];
                  }
                  if (MIXED_ASSET_CATEGORIES.includes(val) && asset.stockRatio === undefined) {
                    updates.stockRatio = 30;
                  }
                  
                  const isExist = curAcc.targetPortfolio.some(t => t.name.trim().toLowerCase() === val.toLowerCase());
                  
                  updateAcc({
                    assets: curAcc.assets.map(a => a.id === asset.id ? { ...a, ...updates } : a),
                    ...(isExist ? {} : {
                      targetPortfolio: [...curAcc.targetPortfolio, { name: val, value: 0, color: DEFAULT_COLORS[curAcc.targetPortfolio.length % DEFAULT_COLORS.length] }]
                    })
                  });

                  if (!isExist) {
                    showMsg("success", `"${val}" 자산군이 등록되었습니다.`);
                  }
                }
                setCustomMode(false);
              }}
              placeholder="자산군명 직접 입력" className={inpBase} />
            <button onClick={() => setCustomMode(false)} className="text-[10px] text-slate-400 font-bold underline pl-1 hover:text-slate-600 transition-colors">← 목록에서 선택</button>
          </div>
        );
      }

      return (
        <div className="relative" ref={ref}>
          <button type="button" onClick={() => setShowPreset(!showPreset)} className={`${inpBase} text-left flex justify-between items-center ${!asset.category ? 'text-slate-400' : 'text-slate-800'}`}>
            <span className="truncate mr-2">{asset.category || "자산군 선택"}</span>
            <ChevronDown size={14} className={`flex-shrink-0 transition-transform duration-200 ${showPreset ? 'rotate-180 text-slate-700' : 'text-slate-400'}`}/>
          </button>
          {showPreset && (
            <div className="absolute top-full left-0 right-0 mt-1 bg-white border border-slate-200 rounded-2xl shadow-xl z-[60] overflow-hidden">
              <div className="p-1.5 flex flex-col max-h-72 overflow-y-auto scrollbar-hide">
                {ASSET_PRESETS.map(preset => (
                  <button key={preset.label} type="button" onClick={() => handleSelect(preset)}
                    className={`flex items-center gap-3 w-full px-4 py-3 rounded-xl text-sm font-bold text-left transition-all hover:bg-slate-50 ${preset.label === "직접입력" ? "text-slate-400 border-t border-slate-100 mt-1 pt-3 justify-center" : asset.category === preset.label ? "bg-slate-50 text-slate-900" : "text-slate-700"}`}>
                    {preset.label !== "직접입력" && <span className="w-3 h-3 rounded-full flex-shrink-0 shadow-sm" style={{ background: preset.color }}></span>}
                    <span className="flex-1">{preset.label}</span>
                    {asset.category === preset.label && preset.label !== "직접입력" && <span className="text-emerald-500 text-xs font-black">✓ 선택됨</span>}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [isLoaded, setIsLoaded] = useState(false);
      const [activeAccount, setActiveAccount] = useState("pension1");
      const [activeTab, setActiveTab] = useState("dashboard");
      const [dDay, setDDay] = useState(0);
      const [global, setGlobal] = useState({ userName: "김투자", incomeLevel: "5500이하" });
      const [confirmReset, setConfirmReset] = useState(false);
      const [parkingDeployRatio, setParkingDeployRatio] = useState(0); // 파킹 자산 활용 비율 상태 추가

      const [accounts, setAccounts] = useState({
        pension1: {
          limit: 6000000, color: "#6366f1", label: "연금저축1 (세액공제)", rebalanceMonth: 7, rebalanceDay: 15, monthlyInput: 500000, targetPortfolio: PENSION1_DEFAULT_TARGET,
          assets: [
            { id: 1, category: "S&P500",  name: "TIGER 미국S&P500",    code: "360750", quantity: 120, price: 14200, currentPrice: 15100, assetType: "위험자산" },
            { id: 2, category: "나스닥",  name: "KODEX 미국나스닥100",  code: "379810", quantity: 45,  price: 18500, currentPrice: 19800, assetType: "위험자산" },

        let priorityCounter = 1;
        const deviationData = tempDeviation.map(d => {
          let priority = null;
          if (d.deficitAmount > 0) priority = priorityCounter++;
          return { ...d, priority };
        });

        // buyLogic 반환 객체에 deployParkingCash 및 deployCash 추가 전달
        return { currentPortfolio, fullRebalancePlan, buyOrders: orders, remainingCash: cash, totalProfit: normalRebalancePlan.reduce((s, x) => s + Math.max(0, x.profit), 0), fee, totalSellAmt, deviationData, invalidTarget, deployParkingCash, generatedParkingSellOrders, deployCash };
      }, [activeHasTarget, curAcc, stats.allocationBaseValue, stats.parkingValue, totalInvestableCash, activeAccount, parkingDeployRatio]);

      const chAsset = (id, f, v) => updateAcc({ assets: curAcc.assets.map(a => a.id === id ? { ...a, [f]: v } : a) });
      const chContrib = (id, f, v) => updateAcc({ contributions: curAcc.contributions.map(c => c.id === id ? { ...c, [f]: v } : c) });
      const chPast = (id, f, v) => updateAcc({ pastContributions: curAcc.pastContributions.map(c => c.id === id ? { ...c, [f]: v } : c) });

      const moveAsset = (index, direction) => {
        if ((direction === -1 && index === 0) || (direction === 1 && index === curAcc.assets.length - 1)) return;
        const newAssets = [...curAcc.assets];
        const temp = newAssets[index];
        newAssets[index] = newAssets[index + direction];
        newAssets[index + direction] = temp;
        updateAcc({ assets: newAssets });
      };

      const fetchStock = async (code) => {
        const url = `https://m.stock.naver.com/api/stock/${code}/basic`;
        for (const proxy of [`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`]) {
          try {
            const res = await fetch(proxy); if (!res.ok) continue; const d = await res.json();
            const actual = proxy.includes("allorigins") && d.contents ? JSON.parse(d.contents) : d;
            const priceStr = actual.closePrice || (actual.result && actual.result.closePrice);
            const nameStr = actual.stockName || (actual.result && actual.result.stockName);
            if (priceStr || nameStr) return { price: priceStr ? Number(priceStr.replace(/,/g, "")) : null, name: nameStr || "" };
          } catch (e) {}
        }
        return null;
      };

      const onCodeBlur = async (id, code) => {
        if (!code || code.trim().length < 5) return;
        const accountAtStart = activeAccount;
        
        setFetchingId(id);

      const fetchAllPrices = async () => {
        if (isFetching) return;
        
        setIsFetching(true); setFetchError(""); let err = false;
        const currentAccount = activeAccount;
        const currentAssets = accounts[currentAccount].assets;

          if (a.code && a.code.length >= 5) { 
            const d = await fetchStock(a.code); 
            if (d) return { id: a.id, currentPrice: d.price || a.currentPrice, name: d.name || a.name }; 
            err = true; 
          }
          return null;
        }));

        setAccounts(prev => {
          if (!prev[currentAccount]) return prev;
          return {
            ...prev,
            [currentAccount]: {
              ...prev[currentAccount],
              assets: prev[currentAccount].assets.map(prevAsset => {
                const update = updates.find(u => u && u.id === prevAsset.id);
                return update ? { ...prevAsset, currentPrice: update.currentPrice, name: update.name } : prevAsset;
              })
            }
          };
        });

        setIsFetching(false);
        if (err) { setFetchError("일부 종목 조회 실패"); setTimeout(() => setFetchError(""), 3000); }
      };

              if (d) return { id: a.id, currentPrice: d.price || a.currentPrice, name: d.name || a.name };
              hasErr = true;
            }
            return null;
          }));
          accountUpdates[accKey] = updates;
        }
        
        setAccounts(prev => {
          const nextAccounts = { ...prev };

            const updates = accountUpdates[accKey];

              assets: nextAccounts[accKey].assets.map(prevAsset => {
                const update = updates.find(u => u && u.id === prevAsset.id);

                  </div>
                  {curAcc.targetPortfolio.length > 0 && (
                    <div className={`mt-4 p-4 rounded-xl flex justify-between items-center font-bold text-xs ${curAcc.targetPortfolio.reduce((s, t) => s + (Number(t.value) || 0), 0) === 100 ? 'bg-emerald-50 text-emerald-700' : 'bg-rose-50 text-rose-700'}`}>
                      <span>합계 (100% 필수)</span>
                      <span className="text-base font-black">{curAcc.targetPortfolio.reduce((s, t) => s + (Number(t.value) || 0), 0)}%</span>
                    </div>
                  )}
                </div>

                {/* 리밸런싱 주기 설정 */}
                <div className={`${cardBase} p-6 space-y-3`}>
                  <p className="text-sm font-bold text-slate-800 flex items-center gap-2 mb-4">
                    <Calendar size={16} /> 정기 리밸런싱 주기
                  </p>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-[10px] font-bold text-slate-400 mb-1 uppercase">기준 월</label>
                      <select value={curAcc.rebalanceMonth} onChange={e => updateAcc({ rebalanceMonth: Number(e.target.value) })} className={inpBase}>
                        {Array.from({length: 12}, (_, i) => i + 1).map(m => <option key={m} value={m}>{m}월</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-[10px] font-bold text-slate-400 mb-1 uppercase">기준 일</label>
                      <input type="number" min="1" max="31" value={curAcc.rebalanceDay} 
                        onChange={e => {
                          const textVal = e.target.value;
                          let val = Number(textVal);
                          if (textVal.trim() === '' || isNaN(val) || val < 1) val = 1;
                          const lastDay = new Date(new Date().getFullYear(), curAcc.rebalanceMonth, 0).getDate();
                          const safeDay = Math.min(val, lastDay);
                          updateAcc({ rebalanceDay: safeDay });
                        }} 
                        className={`${inpBase} text-right`} />
                    </div>
                  </div>
                </div>

                {/* 공통 계정 설정 */}
                <div className={`${cardBase} p-6 space-y-4`}>
                  <p className="text-sm font-bold text-slate-800 flex items-center gap-2"><User size={16} /> 공통 계정 설정</p>
                  <div><label className="block text-[10px] font-bold text-slate-400 mb-1">사용자 이름</label><input type="text" value={global.userName} onChange={e => setGlobal({ ...global, userName: e.target.value })} className={inpBase} /></div>
                  
                  <div>
                    <label className="flex items-center gap-1.5 text-[10px] font-bold text-slate-400 mb-2 uppercase">
                      급여 구간 (세액공제율 산정용)
                      <Tip text={"연간 총급여 기준으로 세액공제율이 달라집니다.\n\n• 5,500만원 이하: 16.5% 공제\n• 5,500만원 초과: 13.2% 공제\n\n통합리포트에서 연말정산 예상 환급금 계산에 사용됩니다."} />
                    </label>
                    <div className="flex gap-2">
                      {[{ id: "5500이하", l: "5,500만 이하 (16.5%)" }, { id: "5500초과", l: "5,500만 초과 (13.2%)" }].map(t => (
                        <button key={t.id} onClick={() => setGlobal({ ...global, incomeLevel: t.id })}
                          className={`flex-1 py-3.5 rounded-xl text-[10px] font-black transition-all border ${global.incomeLevel === t.id ? 'bg-slate-900 text-white border-slate-900 shadow-md' : 'bg-white text-slate-500 border-slate-200'}`}>{t.l}</button>
                      ))}
                    </div>
                  </div>
                </div>

                {/* 데이터 관리 */}
                <div className={`${cardBase} p-6 space-y-3`}>
                  <p className="text-sm font-bold text-slate-800 flex items-center gap-2 mb-4"><Archive size={16} /> 데이터 관리</p>
                  <div>
                    <div className="flex items-center gap-2 mb-2">
                      <p className="text-[10px] font-bold text-slate-400 uppercase">연도 마감 및 이월</p>
                      <Tip text={"작년까지의 월별 납입 내역을 '과거 누적 합계'로 압축합니다.\n\n• 실행 전 자동으로 JSON 백업이 저장됩니다.\n• 현재 계좌에만 적용됩니다.\n• 올해 데이터는 그대로 유지됩니다."} />
                    </div>
                    <button onClick={doSettle} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-sm shadow-md active:scale-95 transition-all flex items-center justify-center gap-2">
                      <RefreshCw size={16} /> 지난 연도 데이터 마감 및 이월 (현재 계좌)
                    </button>
                  </div>
                  <button onClick={exportData} className="w-full py-4 bg-slate-50 border border-slate-200 rounded-2xl flex items-center justify-center gap-2 text-sm font-bold text-slate-700 active:scale-95 transition-all"><Download size={16} /> 전체 계좌 백업 (.json)</button>
                  <label className="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl flex items-center justify-center gap-2 text-sm font-bold text-slate-400 cursor-pointer active:scale-95 transition-all">
                    <Upload size={16} /> 백업 파일 불러오기 <input type="file" accept=".json" onChange={importData} className="hidden" />
                  </label>
                  
                  {/* 안전한 초기화 버튼 */}
                  <div className="pt-4 mt-2 border-t border-slate-100">
                    {confirmReset ? (
                      <div className="flex gap-2">
                        <button onClick={() => { localStorage.removeItem("retireLab_accounts_v3"); localStorage.removeItem("retireLab_global_v3"); window.location.reload(); }} 
                          className="flex-1 py-3 bg-rose-500 text-white font-bold text-xs rounded-xl shadow-md active:scale-95 transition-all">예, 초기화합니다</button>
                        <button onClick={() => setConfirmReset(false)} 
                          className="flex-1 py-3 bg-slate-100 text-slate-700 font-bold text-xs rounded-xl active:scale-95 transition-all">취소</button>
                      </div>
                    ) : (
                      <button onClick={() => setConfirmReset(true)}
                        className="w-full py-2 text-rose-400 font-bold text-xs hover:text-rose-600 transition-colors">전체 데이터 초기화 (샘플 로드)</button>
                    )}
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* 하단 탭 바 */}
          <nav className="fixed bottom-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-xl border-t border-slate-200 shadow-[0_-10px_40px_rgba(0,0,0,0.04)] pb-[env(safe-area-inset-bottom)]">
            <div className="max-w-4xl mx-auto grid grid-cols-4 h-[68px]">
              {tabs.map(tab => {
                const active = activeTab === tab.id;
                const tint = activeAccount === "report" ? "#1e293b" : curAcc.color;
                return (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)} disabled={activeAccount === "report"}
                    className={`relative flex flex-col items-center justify-center gap-1 transition-all ${activeAccount === "report" ? 'opacity-30' : ''}`}
                    style={{ color: active ? tint : "#94a3b8" }}>
                    {active && <div className="absolute top-0 left-1/2 -translate-x-1/2 w-10 h-0.5 rounded-b-full" style={{ background: tint }} />}
                    <tab.icon size={22} strokeWidth={active ? 2.5 : 2} style={{ transform: active ? 'scale(1.1)' : 'scale(1)' }} />
                    <span className="text-[10px] font-black">{tab.label}</span>
                  </button>
                );
              })}
            </div>
          </nav>

          {/* 리밸런싱 모달 */}
          {showRebalance && activeHasTarget && !buyLogic.invalidTarget && (
            <div className="fixed inset-0 z-[60] flex items-end sm:items-center justify-center bg-slate-900/60 p-4 backdrop-blur-sm">
              <div className="bg-white w-full max-w-2xl rounded-t-3xl sm:rounded-3xl flex flex-col shadow-2xl overflow-hidden" style={{ maxHeight: '90vh' }}>
                <div className="p-6 border-b border-slate-100 flex justify-between items-start">
                  <div>
                    <p className="text-xs font-bold text-slate-400 mb-1">{curAcc.label} 정기 리밸런싱</p>
                    <h2 className="text-xl font-black text-slate-800">매도 / 매수 주문서</h2>
                  </div>
                  <button onClick={() => setShowRebalance(false)} className="p-2 rounded-full bg-slate-100 text-slate-500"><X size={18} /></button>
                </div>
                <div className="p-4 sm:p-6 overflow-y-auto space-y-3 bg-slate-50 flex-1">
                  {buyLogic.fullRebalancePlan.length === 0 ? (
                    <div className="text-center py-10 text-slate-400 text-sm font-bold border-2 border-dashed border-slate-200 rounded-2xl bg-white">현재 비중이 완벽합니다! 🎉</div>
                  ) : buyLogic.fullRebalancePlan.map((item, i) => {
                    const sell = item.shares < 0;
                    const isParking = item.isParkingLiquidation;
                    return (
                      <div key={i} className={`rounded-2xl border p-4 shadow-sm ${isParking ? 'bg-amber-50 border-amber-200' : 'bg-white border-slate-200'}`} style={!isParking ? { borderColor: sell ? '#bfdbfe' : '#fecdd3' } : {}}>
                        <div className="flex justify-between gap-3 mb-3">
                          <div className="min-w-0">
                            <p className="text-[10px] font-bold text-slate-400">{item.name}</p>
                            <p className="text-sm font-bold text-slate-800 truncate">{item.assetName}</p>
                          </div>
                          <span className={`flex-shrink-0 text-sm font-black px-3 py-1.5 rounded-xl border ${isParking ? 'bg-amber-100 text-amber-700 border-amber-200' : sell ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-rose-50 text-rose-700 border-rose-200'}`}>
                            {isParking ? "파킹 매도" : (sell ? "매도" : "매수")} {fmt(Math.abs(item.shares))}주
                          </span>
                        </div>
                        <div className="grid grid-cols-3 gap-2 text-xs">
                          <div className="bg-white/50 rounded-lg p-2.5 text-center"><p className="text-[10px] font-bold text-slate-400 mb-0.5">비중 조절</p><p className="font-bold text-slate-700">{isParking ? "재원 활용" : `${item.currentWeight}% → ${item.targetWeight}%`}</p></div>
                          <div className="bg-white/50 rounded-lg p-2.5 text-center"><p className="text-[10px] font-bold text-slate-400 mb-0.5">현재가</p><p className="font-bold text-slate-700">₩{fmt(item.currentPrice)}</p></div>
                          <div className="bg-white/50 rounded-lg p-2.5 text-center"><p className="text-[10px] font-bold text-slate-400 mb-0.5">예상금액</p><p className="font-black" style={{ color: sell ? '#2563eb' : '#e11d48' }}>{sell ? "-" : "+"}₩{fmt(Math.abs(item.shares * item.currentPrice))}</p></div>
                        </div>
                        {!isParking && sell && item.profit > 0 && <div className="mt-2 text-[11px] font-bold text-rose-500 bg-rose-50 rounded-lg px-3 py-2 border border-rose-100 inline-block">예상 실현 차익 (과세이연): +₩{fmt(item.profit)}</div>}
                      </div>
                    );
                  })}
                  {buyLogic.fullRebalancePlan.length > 0 && (
                    <React.Fragment>
                      <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 text-[11px] text-amber-800 shadow-sm mt-4">
                        <p className="font-bold flex items-center gap-1.5 mb-2"><Info size={14} /> 리밸런싱 세금 참고사항</p>
                        <ul className="list-disc pl-4 space-y-1 opacity-90">
                          <li><strong>파란색(매도) 주문을 먼저</strong> 체결하여 예수금을 확보하세요.</li>
                          <li><strong>과세이연 계좌</strong>이므로 매매차익에 대한 세금은 인출 시점까지 없습니다.</li>
                          <li>세액공제를 받지 않은 초과 납입분은 <strong>납입확인서 및 불공제 확인서</strong> 제출 시 과세 제외됩니다.</li>
                        </ul>
                      </div>
                      <div className="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                        <div className="flex justify-between items-center mb-2.5 text-xs"><span className="text-slate-500 font-bold">총 매도 예상 차익 (과세이연)</span><span className="font-black text-rose-500">₩{fmt(buyLogic.totalProfit)}</span></div>
                        <div className="flex justify-between items-center mb-2.5 text-xs"><span className="text-slate-500 font-bold">예상 매도 수수료 (~0.2%)</span><span className="font-black text-slate-400">-₩{fmt(Math.round(buyLogic.fee))}</span></div>
                        <div className="border-t border-slate-100 pt-3 mt-1 flex justify-between items-center">
                          <span className="text-sm font-black text-slate-800">매도 후 확보 예수금</span>
                          <span className="text-lg font-black text-blue-600">₩{fmt(Math.round(buyLogic.totalSellAmt - buyLogic.fee))}</span>
                        </div>
                      </div>
                    </React.Fragment>
                  )}
                </div>
                <div className="p-4 sm:p-6 border-t border-slate-100 bg-white">
                  <button onClick={() => setShowRebalance(false)} className="w-full py-4 bg-slate-900 text-white font-black text-sm rounded-2xl shadow-lg active:scale-95 transition-all">확인 및 닫기</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const rootElement = document.getElementById("root");
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
