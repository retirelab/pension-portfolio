<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="연금 포트폴리오" />
  <title>내 연금 포트폴리오</title>
  
  <!-- 1. 가장 안정적인 글로벌 CDN 서버로 모두 교체 (하얀 화면 방지) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide-react@0.263.1/dist/umd/lucide-react.min.js"></script>

  <style>
    body { background: #f8fafc; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    /* 숫자 입력 화살표 숨기기 */
    input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    /* 에러 발생 시 띄워줄 박스 디자인 */
    #error-box { display: none; padding: 20px; margin: 20px; background: #fee2e2; border: 2px solid #ef4444; border-radius: 12px; color: #b91c1c; font-weight: bold; font-family: monospace; white-space: pre-wrap; word-break: break-all; z-index: 9999; position: relative; }
  </style>
</head>
<body>
  <!-- 2. 에러가 나면 여기에 표시됩니다 -->
  <div id="error-box"></div>
  <div id="root"></div>

  <!-- 에러 감지기 스크립트 -->
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      document.getElementById('error-box').style.display = 'block';
      document.getElementById('error-box').innerText = "🚨 앱 실행 중 에러가 발생했습니다:\n\n" + message + "\n\n(이 화면을 캡처해서 클로드에게 보여주세요!)";
    };
  </script>

  <script type="text/babel">
    // 라이브러리 로딩 실패 방어 코드
    if (typeof React === 'undefined' || typeof lucideReact === 'undefined') {
      throw new Error("인터넷 환경 문제로 필수 파일을 불러오지 못했습니다. 브라우저를 새로고침 해주세요.");
    }

    const { useState, useEffect, useRef } = React;
    const {
      TrendingUp, Calendar, AlertTriangle, CheckCircle2, DollarSign,
      LayoutDashboard, List, Plus, Trash2, RefreshCw, Wallet, Calculator,
      Info, ChevronDown, X, Settings, Download, Upload, PieChart, Coins, Archive
    } = lucideReact;

    const fmt = (n) => Number(n || 0).toLocaleString("ko-KR");

    function DonutChart({ data, title, subtitle }) {
      let cum = 0;
      const total = data.reduce((s, d) => s + (Number(d.value) || 0), 0);
      return (
        <div className="flex flex-col items-center bg-white p-5 rounded-2xl border border-slate-200 shadow-sm w-full">
          <p className="text-sm font-bold text-slate-800">{title}</p>
          <p className="text-xs text-slate-400 mt-0.5 mb-4">{subtitle}</p>
          <div className="relative w-40 h-40 sm:w-48 sm:h-48">
            <svg viewBox="0 0 40 40" style={{transform:'rotate(-90deg)'}} className="w-full h-full">
              {data.map((s, i) => {
                const val = Number(s.value) || 0;
                const da = `${val} ${100 - val}`;
                const offset = 100 - cum;
                cum += val;
                return (
                  <circle key={i} cx="20" cy="20" r="15.92" fill="transparent"
                    stroke={s.color} strokeWidth="5.5"
                    strokeDasharray={da} strokeDashoffset={offset}
                    style={{transition:'all 0.5s ease-in-out'}} />
                );
              })}
            </svg>
            <div className="absolute inset-0 flex flex-col items-center justify-center">
              <span className="text-slate-400 font-semibold" style={{fontSize:10}}>총 비중</span>
              <span className="text-xl font-black text-slate-800">{Math.round(total)}%</span>
            </div>
          </div>
          <div className="mt-4 w-full flex flex-wrap justify-center gap-1.5">
            {data.map((s, i) => (
              <span key={i} className="flex items-center bg-slate-50 border border-slate-100 px-2.5 py-1 rounded-full font-semibold text-slate-700" style={{fontSize:11}}>
                <span className="w-2 h-2 rounded-full mr-1.5 flex-shrink-0" style={{background: s.color}}></span>
                {s.name} <span className="ml-1 font-bold text-slate-500">{s.value}%</span>
              </span>
            ))}
          </div>
        </div>
      );
    }

    function ReturnBadge({ amount, rate }) {
      const pos = amount > 0, neg = amount < 0;
      const color = pos ? "#f43f5e" : neg ? "#3b82f6" : "#94a3b8";
      return (
        <div className="text-right text-xs">
          <span className="font-black" style={{color}}>{pos ? "+" : ""}{fmt(amount)}원</span>
          <span className="ml-1 font-bold" style={{color, opacity: 0.8}}>
            ({pos ? "▲" : neg ? "▼" : ""}{Math.abs(rate || 0).toFixed(2)}%)
          </span>
        </div>
      );
    }

    function App() {
      const [isLoaded, setIsLoaded] = useState(false);
      const [dDay, setDDay] = useState(0);
      const [activeTab, setActiveTab] = useState("dashboard");
      const [isFetching, setIsFetching] = useState(false);
      const [fetchError, setFetchError] = useState("");
      const [msg, setMsg] = useState({ type: "", text: "" });
      const msgTimerRef = useRef(null);
      const [expandedAsset, setExpandedAsset] = useState(null);
      const [expandedContrib, setExpandedContrib] = useState(null);
      const [showRebalance, setShowRebalance] = useState(false);
      const [showSettlement, setShowSettlement] = useState(false);
      const [pastOpen, setPastOpen] = useState(false);

      const [userName, setUserName] = useState("김투자");
      const [rebalanceYear, setRebalanceYear] = useState(new Date().getFullYear());
      const [rebalanceMonth, setRebalanceMonth] = useState(7);
      const [rebalanceDay, setRebalanceDay] = useState(15);
      const [monthlyInput, setMonthlyInput] = useState(800000);

      const [targetPortfolio, setTargetPortfolio] = useState([
        { name: "S&P500",  value: 24, color: "#3b82f6" },
        { name: "나스닥",  value: 9,  color: "#14b8a6" },
        { name: "CSI300",  value: 13, color: "#ef4444" },
        { name: "한국200", value: 8,  color: "#6366f1" },
        { name: "미국채",  value: 12, color: "#8b5cf6" },
        { name: "국고채",  value: 12, color: "#10b981" },
        { name: "금",      value: 22, color: "#f59e0b" },
      ]);

      const [pastContributions, setPastContributions] = useState([
        { id: 1, year: 2024, amount: 15000000, dividend: 350000 },
        { id: 2, year: 2025, amount: 15000000, dividend: 650000 },
      ]);

      const [contributions, setContributions] = useState([
        { id: 1, month: "2026-01", amount: 800000, type: "입금", memo: "정기 납입" },
        { id: 2, month: "2026-02", amount: 800000, type: "입금", memo: "정기 납입" },
        { id: 3, month: "2026-03", amount: 25000,  type: "배당", memo: "S&P500 분배금 재투자" },
      ]);

      const [assets, setAssets] = useState([
        { id: 1, category: "S&P500",  name: "TIGER 미국S&P500",           code: "360750", quantity: 500, price: 14000, currentPrice: 14500 },
        { id: 2, category: "나스닥",  name: "KODEX 미국나스닥100",         code: "379810", quantity: 200, price: 18000, currentPrice: 18500 },
        { id: 3, category: "CSI300",  name: "KODEX 차이나CSI300",          code: "283580", quantity: 600, price: 8000,  currentPrice: 8200  },
        { id: 4, category: "한국200", name: "KIWOOM 200TR",                code: "294400", quantity: 150, price: 30000, currentPrice: 31000 },
        { id: 5, category: "미국채",  name: "RISE 미국30년국채액티브",     code: "481340", quantity: 500, price: 9000,  currentPrice: 9200  },
        { id: 6, category: "국고채",  name: "RISE KIS국고채30년Enhanced",  code: "385560", quantity: 50,  price: 50000, currentPrice: 49000 },
        { id: 7, category: "금",      name: "TIGER KRX금현물",             code: "0072R0", quantity: 700, price: 13000, currentPrice: 13500 },
      ]);

      const fileRef = useRef(null);
      const currentYear = new Date().getFullYear();

      useEffect(() => {
        return () => { if (msgTimerRef.current) clearTimeout(msgTimerRef.current); };
      }, []);

      // 로컬 스토리지 안전 로딩
      useEffect(() => {
        try {
          const raw = localStorage.getItem("myRetirementData");
          if (raw) {
            const p = JSON.parse(raw);
            if (p.userName) setUserName(p.userName);
            if (p.assets) setAssets(p.assets);
            if (p.contributions) setContributions(p.contributions);
            if (p.pastContributions) setPastContributions(p.pastContributions);
            if (p.targetPortfolio) setTargetPortfolio(p.targetPortfolio);
            if (p.rebalanceYear) setRebalanceYear(p.rebalanceYear);
            if (p.rebalanceMonth) setRebalanceMonth(p.rebalanceMonth);
            if (p.rebalanceDay) setRebalanceDay(p.rebalanceDay);
            if (p.monthlyInput !== undefined) setMonthlyInput(p.monthlyInput);
          }
        } catch (e) { console.error(e); }
        setIsLoaded(true);
      }, []);

      useEffect(() => {
        if (!isLoaded) return;
        try {
          localStorage.setItem("myRetirementData", JSON.stringify({
            userName, assets, contributions, pastContributions,
            targetPortfolio, rebalanceYear, rebalanceMonth, rebalanceDay, monthlyInput,
          }));
        } catch {
          showMsg("error", "저장 공간 오류가 발생했습니다.");
        }
      }, [userName, assets, contributions, pastContributions, targetPortfolio,
          rebalanceYear, rebalanceMonth, rebalanceDay, monthlyInput, isLoaded]);

      const showMsg = (type, text) => {
        setMsg({ type, text });
        if (msgTimerRef.current) clearTimeout(msgTimerRef.current);
        msgTimerRef.current = setTimeout(() => setMsg({ type: "", text: "" }), 4000);
      };

      useEffect(() => {
        const today = new Date(); today.setHours(0,0,0,0);
        const target = new Date(rebalanceYear, rebalanceMonth - 1, rebalanceDay);
        setDDay(Math.ceil((target - today) / 86400000));
      }, [rebalanceYear, rebalanceMonth, rebalanceDay]);

      // 파생 계산
      const totalCurrentValue = assets.reduce((s, a) => s + (a.quantity * (a.currentPrice || a.price)), 0);
      const totalBookValue    = assets.reduce((s, a) => s + (a.quantity * a.price), 0);
      const prevPrincipal     = pastContributions.reduce((s, p) => s + (Number(p.amount) || 0), 0);
      const prevDividend      = pastContributions.reduce((s, p) => s + (Number(p.dividend) || 0), 0);
      const activeCash        = contributions.filter(c => c.type !== "배당").reduce((s, c) => s + (Number(c.amount) || 0), 0);
      const activeDividend    = contributions.filter(c => c.type === "배당").reduce((s, c) => s + (Number(c.amount) || 0), 0);
      const currentMonthStr   = `${currentYear}-${String(new Date().getMonth() + 1).padStart(2, "0")}`;
      const thisMonthDividend = contributions.filter(c => c.month === currentMonthStr && c.type === "배당").reduce((s, c) => s + (Number(c.amount) || 0), 0);
      const purePrincipal     = prevPrincipal + activeCash;
      const totalDividend     = prevDividend + activeDividend;
      const totalInvested     = purePrincipal + totalDividend;
      const totalInvestableCash = (Number(monthlyInput) || 0) + thisMonthDividend;
      const bookReturnAmt     = totalCurrentValue - totalBookValue;
      const bookReturnRate    = totalBookValue > 0 ? (bookReturnAmt / totalBookValue) * 100 : 0;
      const principalReturnAmt  = totalCurrentValue - purePrincipal;
      const principalReturnRate = purePrincipal > 0 ? (principalReturnAmt / purePrincipal) * 100 : 0;
      const capitalGain       = totalCurrentValue - totalInvested;
      const pctP = totalCurrentValue > 0 ? (purePrincipal / totalCurrentValue) * 100 : 0;
      const pctD = totalCurrentValue > 0 ? (totalDividend / totalCurrentValue) * 100 : 0;
      const pctG = (totalCurrentValue > 0 && capitalGain > 0) ? (capitalGain / totalCurrentValue) * 100 : 0;
      const yearCash       = contributions.filter(c => c.month.startsWith(String(currentYear)) && c.type !== "배당").reduce((s, c) => s + (Number(c.amount) || 0), 0);
      const remainingLimit = Math.max(0, 6000000 - yearCash);
      const totalTargetSum = targetPortfolio.reduce((s, t) => s + (Number(t.value) || 0), 0);

      const currentPortfolio = targetPortfolio.map(t => {
        const cv = assets.filter(a => a.category === t.name).reduce((s, a) => s + (a.quantity * (a.currentPrice || a.price)), 0);
        const w  = totalCurrentValue > 0 ? (cv / totalCurrentValue) * 100 : 0;
        return { ...t, value: Number(w.toFixed(1)), targetWeight: Number(t.value) || 0, categoryValue: cv,
          status: w >= t.value ? "over" : w < t.value - 2 ? "under" : "warning" };
      });

      const fullRebalancePlan = currentPortfolio.map(p => {
        const pa = assets.find(a => a.category === p.name);
        const cp = pa ? (pa.currentPrice || pa.price) : 0;
        const ap = pa ? pa.price : 0;
        const diff = totalCurrentValue * (p.targetWeight / 100) - p.categoryValue;
        const shares = cp > 0 ? Math.round(diff / cp) : 0;
        const profit = shares < 0 ? Math.abs(shares) * (cp - ap) : 0;
        return { name: p.name, assetName: pa ? pa.name : p.name, currentWeight: p.value, targetWeight: p.targetWeight, shares, currentPrice: cp, profit };
      }).filter(x => x.shares !== 0).sort((a, b) => a.shares - b.shares);

      const totalProfit  = fullRebalancePlan.reduce((s, x) => s + Math.max(0, x.profit), 0);
      const totalSellAmt = fullRebalancePlan.filter(x => x.shares < 0).reduce((s, x) => s + Math.abs(x.shares * x.currentPrice), 0);
      const fee          = totalSellAmt * 0.002;

      const calcBuy = () => {
        const vt = totalCurrentValue + totalInvestableCash;
        let cash = totalInvestableCash;
        const orders = [];
        currentPortfolio
          .map(p => {
            const pa = assets.find(a => a.category === p.name);
            return { ...p, assetName: pa ? pa.name : p.name, currentPrice: pa ? (pa.currentPrice || pa.price) : 0, deficit: vt * (p.targetWeight / 100) - p.categoryValue };
          })
          .filter(d => d.deficit > 0).sort((a, b) => b.deficit - a.deficit)
          .forEach(item => {
            if (cash >= item.currentPrice && item.currentPrice > 0) {
              const n = Math.min(Math.floor(cash / item.currentPrice), Math.ceil(item.deficit / item.currentPrice));
              if (n > 0) { orders.push({ ...item, shares: n, cost: n * item.currentPrice }); cash -= n * item.currentPrice; }
            }
          });
        return { buyOrders: orders, remainingCash: cash };
      };
      const { buyOrders, remainingCash } = calcBuy();

      const chAsset = (id, f, v) => setAssets(prev => prev.map(a => a.id === id ? { ...a, [f]: v } : a));
      const addAsset = () => {
        const id = assets.length ? Math.max(...assets.map(a => a.id)) + 1 : 1;
        setAssets(prev => [...prev, { id, category: "", name: "", code: "", quantity: 0, price: 0, currentPrice: 0 }]);
        setExpandedAsset(id);
      };
      const chContrib = (id, f, v) => setContributions(prev => prev.map(c => c.id === id ? { ...c, [f]: v } : c));
      const addContrib = () => {
        const id = contributions.length ? Math.max(...contributions.map(c => c.id)) + 1 : 1;
        setContributions(prev => [...prev, { id, month: currentMonthStr, amount: 0, type: "입금", memo: "" }]);
        setExpandedContrib(id);
      };
      const chPast = (id, f, v) => setPastContributions(prev => prev.map(c => c.id === id ? { ...c, [f]: v } : c));
      const addPast = () => {
        const existing = pastContributions.map(p => p.year);
        let y = currentYear - 1;
        while (existing.includes(y)) y--;
        const id = pastContributions.length ? Math.max(...pastContributions.map(c => c.id)) + 1 : 1;
        setPastContributions(prev => [...prev, { id, year: y, amount: 0, dividend: 0 }]);
      };

      const fetchStock = async (code) => {
        const url = `https://m.stock.naver.com/api/stock/${code}/basic`;
        const proxies = [
          `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
          `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
        ];
        for (const proxy of proxies) {
          try {
            const res = await fetch(proxy);
            if (!res.ok) continue;
            const d = await res.json();
            const actual = proxy.includes("allorigins") && d.contents ? JSON.parse(d.contents) : d;
            const priceStr = actual.closePrice || (actual.result && actual.result.closePrice);
            const nameStr  = actual.stockName  || (actual.result && actual.result.stockName);
            if (priceStr || nameStr) return { price: priceStr ? Number(priceStr.replace(/,/g, "")) : null, name: nameStr || "" };
          } catch(e) { continue; }
        }
        return null;
      };

      const onCodeBlur = async (id, code) => {
        if (!code || code.length < 5) return;
        const d = await fetchStock(code);
        if (d) setAssets(prev => prev.map(a => a.id === id ? { ...a, name: d.name || a.name, currentPrice: d.price || a.currentPrice } : a));
      };

      const fetchAllPrices = async () => {
        setIsFetching(true); setFetchError(""); let err = false;
        const updated = await Promise.all(assets.map(async a => {
          if (a.code && a.code.length >= 5) {
            const d = await fetchStock(a.code);
            if (d) return { ...a, currentPrice: d.price || a.currentPrice, name: d.name || a.name };
            err = true;
          }
          return a;
        }));
        setAssets(updated); setIsFetching(false);
        if (err) { setFetchError("일부 종목의 가격을 불러오지 못했습니다."); setTimeout(() => setFetchError(""), 5000); }
      };

      const exportData = () => {
        const s = JSON.stringify({ userName, assets, contributions, pastContributions, targetPortfolio, rebalanceYear, rebalanceMonth, rebalanceDay, monthlyInput });
        const a = document.createElement("a");
        a.href = "data:application/json;charset=utf-8," + encodeURIComponent(s);
        a.download = `자산배분_백업_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
      };

      const importData = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const r = new FileReader();
        r.onload = (ev) => {
          try {
            const p = JSON.parse(ev.target.result);
            if (p.userName) setUserName(p.userName);
            if (p.assets) setAssets(p.assets);
            if (p.contributions) setContributions(p.contributions);
            if (p.pastContributions) setPastContributions(p.pastContributions);
            if (p.targetPortfolio) setTargetPortfolio(p.targetPortfolio);
            if (p.rebalanceYear) setRebalanceYear(p.rebalanceYear);
            if (p.rebalanceMonth) setRebalanceMonth(p.rebalanceMonth);
            if (p.rebalanceDay) setRebalanceDay(p.rebalanceDay);
            if (p.monthlyInput !== undefined) setMonthlyInput(p.monthlyInput);
            showMsg("success", "데이터가 성공적으로 복구되었습니다!");
          } catch { showMsg("error", "올바른 백업 파일이 아닙니다."); }
        };
        r.readAsText(file); e.target.value = "";
      };

      const trySettle = () => {
        const old = contributions.filter(c => parseInt(c.month.split("-")[0], 10) < currentYear);
        if (!old.length) { showMsg("error", "이월할 과거 데이터가 없습니다."); return; }
        setShowSettlement(true);
      };

      const doSettle = () => {
        exportData();
        const sums = {};
        contributions.filter(c => parseInt(c.month.split("-")[0], 10) < currentYear).forEach(c => {
          const y = parseInt(c.month.split("-")[0], 10);
          if (!sums[y]) sums[y] = { amount: 0, dividend: 0 };
          if (c.type === "입금") sums[y].amount += Number(c.amount || 0);
          else if (c.type === "배당") sums[y].dividend += Number(c.amount || 0);
        });
        let np = pastContributions.map(p => ({ ...p }));
        Object.entries(sums).forEach(([y, v]) => {
          const yn = parseInt(y, 10);
          const idx = np.findIndex(p => p.year === yn);
          if (idx >= 0) { np[idx].amount += v.amount; np[idx].dividend += v.dividend; }
          else { np.push({ id: np.length ? Math.max(...np.map(p => p.id)) + 1 : 1, year: yn, ...v }); }
        });
        setPastContributions(np);
        setContributions(contributions.filter(c => parseInt(c.month.split("-")[0], 10) >= currentYear));
        setShowSettlement(false);
        showMsg("success", "마감 완료! 백업 파일이 자동 다운로드 되었습니다.");
      };

      if (!isLoaded) return (
        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0f172a'}}>
          <div style={{textAlign:'center'}}>
            <div style={{width:48,height:48,border:'4px solid #6366f1',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.8s linear infinite',margin:'0 auto 16px'}} />
            <p style={{color:'#94a3b8',fontSize:14}}>데이터 불러오는 중...</p>
          </div>
        </div>
      );

      const card = "bg-white rounded-2xl border border-slate-200 shadow-sm";
      const inp  = "w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm font-semibold text-slate-800 outline-none transition-all";
      const tabs = [
        { id:"dashboard",     icon:LayoutDashboard, label:"대시보드" },
        { id:"assets",        icon:List,            label:"자산"     },
        { id:"contributions", icon:Wallet,          label:"납입"     },
        { id:"settings",      icon:Settings,        label:"설정"     },
      ];

      return (
        <div className="min-h-screen bg-slate-50" style={{paddingBottom:84}}>

          {/* HEADER */}

                            </span>
                            <div className="flex-1 min-w-0">
                              <p className="text-sm font-bold text-slate-800">{item.month}</p>
                              <p className="text-xs text-slate-400 truncate">{item.memo||"메모 없음"}</p>
                            </div>
                            <p className="text-sm font-black text-slate-800 flex-shrink-0">₩{fmt(item.amount)}</p>
                            <ChevronDown size={16} style={{flexShrink:0,transform:isOpen?'rotate(180deg)':'none',transition:'transform 0.2s',color:isOpen?'#6366f1':'#cbd5e1'}}/>
                          </button>
                          {isOpen&&(
                            <div className="px-4 pb-5 bg-slate-50 border-t border-slate-100">
                              <div className="grid grid-cols-2 gap-2.5 pt-4">
                                <div>
                                  <label className="block font-bold text-slate-500 mb-1" style={{fontSize:10}}>연월</label>
                                  <input type="month" value={item.month} onChange={e=>chContrib(item.id,"month",e.target.value)} className={inp}/>
                                </div>
                                <div>
                                  <label className="block font-bold text-slate-500 mb-1" style={{fontSize:10}}>유형</label>
                                  <select value={item.type} onChange={e=>chContrib(item.id,"type",e.target.value)}
                                    className={`${inp} cursor-pointer`}
                                    style={isDividend?{background:'#fffbeb',borderColor:'#fde68a',color:'#92400e'}:{background:'#eff6ff',borderColor:'#bfdbfe',color:'#1e40af'}}>
                                    <option value="입금">정기/추가 입금</option>
                                    <option value="배당">배당(분배금)</option>
                                  </select>
                                </div>
                                <div>
                                  <label className="block font-bold text-slate-500 mb-1" style={{fontSize:10}}>금액 (₩)</label>
                                  <input type="number" inputMode="numeric" value={item.amount===0?"":item.amount}
                                    onChange={e=>chContrib(item.id,"amount",Number(e.target.value))}
                                    className={`${inp} text-right font-black`}/>
                                </div>
                                <div>
                                  <label className="block font-bold text-slate-500 mb-1" style={{fontSize:10}}>메모</label>
                                  <input type="text" value={item.memo} placeholder="설명 입력"
                                    onChange={e=>chContrib(item.id,"memo",e.target.value)} className={inp}/>
                                </div>
                              </div>
                              <button onClick={()=>{setContributions(prev=>prev.filter(c=>c.id!==item.id));setExpandedContrib(null);}}
                                className="mt-4 w-full py-3 bg-white border border-rose-200 text-rose-500 text-sm font-bold rounded-xl flex items-center justify-center gap-2 transition-colors">
                                <Trash2 size={16}/> 이 내역 삭제하기
                              </button>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className={`${card} overflow-hidden`}>
                  <button onClick={()=>setPastOpen(!pastOpen)}
                    className="w-full px-5 py-4 flex items-center justify-between hover:bg-slate-50 text-left transition-colors">
                    <div>
                      <p className="text-xs font-bold text-slate-500 mb-1">과거 누적 합계 (수동 입력 가능)</p>
                      <p className="text-base font-black text-slate-800">
                        원금 ₩{fmt(prevPrincipal)}
                        <span className="text-sm font-bold text-amber-600 ml-2">+ 배당 ₩{fmt(prevDividend)}</span>
                      </p>
                    </div>
                    <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center flex-shrink-0"
                      style={{transform:pastOpen?'rotate(180deg)':'none',transition:'transform 0.3s',color:pastOpen?'#6366f1':'#64748b'}}>
                      <ChevronDown size={18}/>
                    </div>
                  </button>
                  {pastOpen&&(
                    <div className="px-4 pb-5 border-t border-slate-100 space-y-3 pt-4 bg-slate-50">
                      {pastContributions.map(item=>(
                        <div key={item.id} className="bg-white border border-slate-200 shadow-sm rounded-xl p-4">
                          <div className="flex items-center justify-between mb-3">
                            <div className="flex items-center gap-2">
                              <input type="number" inputMode="numeric" value={item.year||""}
                                onChange={e=>chPast(item.id,"year",Number(e.target.value))}
                                className="bg-slate-50 border border-slate-200 rounded-lg px-2 py-2 text-sm font-black text-slate-700 outline-none text-center" style={{width:'6rem'}}/>
                              <span className="text-xs text-slate-500 font-bold">년 합산</span>
                            </div>
                            <button onClick={()=>setPastContributions(prev=>prev.filter(c=>c.id!==item.id))}
                              className="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-rose-500 transition-colors">
                              <Trash2 size={16}/>
                            </button>
                          </div>
                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="block font-bold text-slate-500 mb-1" style={{fontSize:10}}>누적 원금액</label>
                              <input type="number" inputMode="numeric" value={item.amount===0?"":item.amount}
                                onChange={e=>chPast(item.id,"amount",Number(e.target.value))}
                                className={`${inp} text-right font-black`}/>
                            </div>
                            <div>
                              <label className="block font-bold mb-1" style={{fontSize:10,color:'#d97706'}}>누적 배당(분배)금</label>
                              <input type="number" inputMode="numeric" value={item.dividend===0?"":item.dividend}
                                onChange={e=>chPast(item.id,"dividend",Number(e.target.value))}
                                className={`${inp} text-right font-black`} style={{background:'#fffbeb',borderColor:'#fde68a',color:'#92400e'}}/>
                            </div>
                          </div>
                        </div>
                      ))}
                      <button onClick={addPast}
                        className="w-full py-3.5 border border-dashed border-slate-300 text-slate-500 text-sm font-bold rounded-xl flex items-center justify-center gap-1.5 transition-colors hover:bg-white">
                        <Plus size={15}/> 연도 수동 추가
                      </button>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* 설정 탭 */}
            {activeTab === "settings" && (
              <div className="space-y-4">
                {msg.text&&(
                  <div className={`p-4 rounded-xl text-sm font-bold flex items-center gap-2.5 ${msg.type==="success"?"bg-emerald-50 text-emerald-700 border border-emerald-200":"bg-rose-50 text-rose-600 border border-rose-200"}`}>
                    {msg.type==="success"?<CheckCircle2 size={18} className="flex-shrink-0"/>:<AlertTriangle size={18} className="flex-shrink-0"/>}
                    {msg.text}
                  </div>
                )}

                <div className={`${card} p-5`}>
                  <div className="flex items-center gap-2.5 mb-2">
                    <div className="w-9 h-9 rounded-xl bg-amber-50 flex items-center justify-center text-amber-500 flex-shrink-0"><Archive size={18}/></div>
                    <p className="text-base font-black text-slate-800">연말 정산 및 데이터 마감</p>
                  </div>
                  <p className="text-xs text-slate-500 mb-1 leading-relaxed">작년까지의 월별 납입 내역을 <strong className="text-slate-700">과거 누적 합계액</strong>으로 이월시킵니다.</p>
                  <p className="text-xs text-amber-600 font-semibold mb-4">※ 실행 전 현재 상태가 파일로 자동 백업됩니다.</p>
                  <button onClick={trySettle}
                    className="w-full flex items-center justify-center gap-2 px-5 py-3.5 text-white font-bold rounded-xl text-sm transition-colors"
                    style={{background:'#1e293b'}}>
                    <RefreshCw size={15}/> 지난 연도 데이터 마감 및 이월하기
                  </button>
                </div>

                <div className={`${card} p-5`}>
                  <div className="flex items-center gap-2.5 mb-2">
                    <div className="w-9 h-9 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-500 flex-shrink-0"><PieChart size={18}/></div>
                    <p className="text-base font-black text-slate-800">목표 자산 비중 설정</p>
                  </div>
                  <p className="text-xs text-slate-500 mb-4">비중의 총합이 반드시 <span className="font-black text-indigo-600">100%</span>가 되어야 합니다.</p>
                  <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
                    {targetPortfolio.map((t,i)=>(
                      <div key={i} className="relative bg-slate-50 border border-slate-200 rounded-xl p-3.5 overflow-hidden">
                        <div className="absolute left-0 top-0 bottom-0 w-1.5 rounded-l-xl" style={{background:t.color}}/>
                        <p className="text-xs font-bold text-slate-700 mb-2 ml-1.5">{t.name}</p>
                        <div className="flex items-center ml-1.5 gap-1.5">
                          <input type="number" inputMode="numeric" min="0" max="100" value={t.value===0?"":t.value}
                            onChange={e=>{
                              const nt=targetPortfolio.map((item,idx)=>idx===i?{...item,value:Number(e.target.value)}:item);
                              setTargetPortfolio(nt);
                            }}
                            className="w-full bg-white border border-slate-200 rounded-lg px-2 py-2.5 text-base font-black text-slate-800 text-right outline-none transition-colors"/>
                          <span className="text-sm font-bold text-slate-500">%</span>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div className={`mt-5 p-4 rounded-xl flex justify-between items-center border font-bold text-sm ${totalTargetSum===100?"bg-emerald-50 text-emerald-700 border-emerald-200":"bg-rose-50 text-rose-700 border-rose-200"}`}>
                    <div className="flex items-center gap-2">
                      {totalTargetSum===100?<CheckCircle2 size={18}/>:<AlertTriangle size={18}/>}
                      현재 비중 총합
                    </div>
                    <div className="text-right">
                      <span className="text-xl font-black block">{totalTargetSum}%</span>
                      {totalTargetSum!==100&&(
                        <span className="text-rose-500 block mt-0.5" style={{fontSize:10}}>
                          {totalTargetSum>100?`${totalTargetSum-100}% 초과`:`${100-totalTargetSum}% 부족`}
                        </span>
                      )}
                    </div>
                  </div>
                </div>

                <div className={`${card} p-5`}>
                  <div className="flex items-center gap-2.5 mb-2">
                    <div className="w-9 h-9 rounded-xl bg-blue-50 flex items-center justify-center text-blue-500 flex-shrink-0"><Download size={18}/></div>
                    <p className="text-base font-black text-slate-800">데이터 백업 & 복구</p>
                  </div>
                  <p className="text-xs text-slate-500 mb-4">모든 정보를 JSON 파일로 저장하거나 불러올 수 있습니다.</p>
                  <div className="space-y-3">
                    <button onClick={exportData}
                      className="w-full flex items-center justify-center gap-2.5 p-4 border border-slate-200 bg-slate-50 text-slate-700 font-bold text-sm rounded-xl transition-colors hover:bg-slate-100">
                      <Download size={16}/> 내 기기로 백업 파일 저장 (.json)
                    </button>
                    <label className="w-full flex items-center justify-center gap-2.5 p-4 border border-dashed border-slate-300 text-slate-600 font-bold text-sm rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                      <Upload size={16}/> 백업 파일 불러오기
                      <input type="file" accept=".json" onChange={importData} ref={fileRef} className="hidden"/>
                    </label>
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* 하단 탭 바 */}
          <nav className="fixed bottom-0 left-0 right-0 z-40 bg-white border-t border-slate-200"
            style={{paddingBottom:'env(safe-area-inset-bottom,0px)',boxShadow:'0 -4px 20px rgba(0,0,0,0.04)'}}>
            <div className="max-w-6xl mx-auto grid grid-cols-4" style={{height:68}}>
              {tabs.map(({id,icon:Icon,label})=>{
                const active=activeTab===id;
                return(
                  <button key={id} onClick={()=>setActiveTab(id)}
                    className="relative flex flex-col items-center justify-center gap-1 transition-colors"
                    style={{color:active?'#6366f1':'#94a3b8'}}>
                    {active&&<div className="absolute top-0 left-1/2 rounded-b-full" style={{transform:'translateX(-50%)',width:40,height:3,background:'#6366f1'}}/>}
                    <Icon size={22} strokeWidth={active?2.5:2} style={{transform:active?'scale(1.1)':'scale(1)',transition:'transform 0.2s'}}/>
                    <span className="font-bold" style={{fontSize:10,color:active?'#6366f1':'#94a3b8'}}>{label}</span>
                  </button>
                );
              })}
            </div>
          </nav>

          {/* 연말정산 모달 */}
          {showSettlement&&(
            <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/60 p-4" style={{backdropFilter:'blur(4px)'}}>
              <div className="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl text-center">
                <div className="w-16 h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-white shadow-sm">
                  <Archive size={28}/>
                </div>
                <p className="text-lg font-black text-slate-800 mb-2">데이터를 마감하시겠습니까?</p>
                <p className="text-xs text-slate-500 leading-relaxed mb-1">작년까지의 납입 내역이 누적 내역으로 병합됩니다.</p>
                <p className="font-bold mb-1 bg-amber-50 py-1.5 px-3 rounded-lg inline-block" style={{fontSize:11,color:'#d97706'}}>⚡ 실행 전 자동으로 백업 파일이 저장됩니다.</p>
                <p className="text-xs text-rose-500 font-semibold mb-6 mt-2">이 작업은 앱 내에서 되돌릴 수 없습니다.</p>
                <div className="flex gap-3">
                  <button onClick={()=>setShowSettlement(false)}
                    className="flex-1 py-3.5 bg-slate-100 text-slate-700 font-bold rounded-2xl text-sm transition-colors">취소</button>
                  <button onClick={doSettle}
                    className="flex-1 py-3.5 text-white font-bold rounded-2xl text-sm transition-colors shadow-md" style={{background:'#1e293b'}}>마감 및 이월</button>
                </div>
              </div>
            </div>
          )}

          {/* 리밸런싱 모달 */}
          {showRebalance&&(
            <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/60" style={{backdropFilter:'blur(4px)'}}>
              <div className="bg-white w-full sm:rounded-3xl sm:max-w-2xl lg:max-w-4xl sm:mx-4 rounded-t-3xl flex flex-col shadow-2xl" style={{maxHeight:'92dvh'}}>
                <div className="p-5 border-b border-slate-100 flex items-start justify-between flex-shrink-0 bg-white rounded-t-3xl">
                  <div>
                    <span className="inline-flex items-center gap-1.5 font-black bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-lg border border-indigo-100 mb-2" style={{fontSize:10}}>
                      <Calendar size={11}/> {rebalanceYear}년 정기 리밸런싱
                    </span>
                    <p className="text-xl font-black text-slate-800">매도/매수 주문서</p>
                    <p className="text-xs text-slate-400 mt-0.5">현재 평가금액 기준 타겟 비중 맞추기</p>
                  </div>
                  <button onClick={()=>setShowRebalance(false)}
                    className="w-9 h-9 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 flex-shrink-0 transition-colors hover:bg-slate-200">
                    <X size={18}/>
                  </button>
                </div>

                <div className="overflow-y-auto p-4 space-y-3 flex-1 bg-slate-50">
                  {fullRebalancePlan.length===0?(
                    <div className="text-center py-12 bg-white rounded-2xl border border-dashed border-slate-200">
                      <p className="text-slate-400 font-medium text-sm">현재 모든 비중이 완벽하여 리밸런싱이 필요 없습니다! 🎉</p>
                    </div>
                  ):fullRebalancePlan.map((item,i)=>{
                    const sell=item.shares<0;
                    return(
                      <div key={i} className="rounded-2xl border p-4 shadow-sm bg-white" style={{borderColor:sell?'#bfdbfe':'#fecdd3'}}>
                        <div className="flex items-start justify-between gap-3 mb-3">
                          <div className="min-w-0">
                            <p className="text-slate-500 font-bold" style={{fontSize:10}}>{item.name}</p>
                            <p className="text-sm font-bold text-slate-800 truncate">{item.assetName}</p>
                          </div>
                          <span className="flex-shrink-0 text-sm font-black px-3 py-1.5 rounded-xl border"
                            style={sell?{background:'#eff6ff',color:'#1d4ed8',borderColor:'#dbeafe'}:{background:'#fff1f2',color:'#be123c',borderColor:'#fecdd3'}}>
                            {sell?"매도":"매수"} {fmt(Math.abs(item.shares))}주
                          </span>
                        </div>
                        <div className="grid grid-cols-3 gap-2 text-xs">
                          <div className="bg-slate-50 rounded-lg p-2.5">
                            <p className="text-slate-400 mb-0.5 font-bold" style={{fontSize:10}}>비중 조절</p>
                            <p className="font-bold text-slate-700">{item.currentWeight}% → {item.targetWeight}%</p>
                          </div>
                          <div className="bg-slate-50 rounded-lg p-2.5">
                            <p className="text-slate-400 mb-0.5 font-bold" style={{fontSize:10}}>현재가</p>
                            <p className="font-bold text-slate-700">₩{fmt(item.currentPrice)}</p>
                          </div>
                          <div className="bg-slate-50 rounded-lg p-2.5">
                            <p className="text-slate-400 mb-0.5 font-bold" style={{fontSize:10}}>예상금액</p>
                            <p className="font-black" style={{color:sell?'#2563eb':'#e11d48'}}>
                              {sell?"-":"+"} ₩{fmt(Math.abs(item.shares*item.currentPrice))}
                            </p>
                          </div>
                        </div>
                        {sell&&item.profit>0&&(
                          <div className="mt-2 font-bold bg-rose-50 rounded-lg px-3 py-2 border border-rose-100 inline-block" style={{fontSize:12,color:'#f43f5e'}}>
                            예상 실현 차익 (과세이연): +₩{fmt(item.profit)}
                          </div>
                        )}
                      </div>
                    );
                  })}

                  {fullRebalancePlan.length>0&&(
                    <>
                      <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 text-xs text-amber-800 shadow-sm">
                        <p className="font-bold flex items-center gap-1.5 mb-2"><Info size={14}/> 리밸런싱 참고사항</p>
                        <ul className="space-y-1.5 font-medium list-disc pl-4" style={{opacity:0.9}}>
                          <li><strong>파란색(매도) 주문을 먼저</strong> 체결하여 예수금을 확보한 뒤 매수를 진행하세요.</li>
                          <li><strong>연금저축계좌는 과세이연 계좌</strong>입니다. 매매차익과 배당금 모두 운용 중 세금이 없으며, 인출 시에만 과세됩니다 (연금수령 3.3~5.5% / 중도인출 16.5%).</li>
                          <li>세액공제를 받지 않은 납입금(초과 납입분)은 인출 시 과세 제외 신청이 가능합니다. 단, <strong>납입확인서 및 불공제 확인서</strong> 제출이 필요합니다.</li>
                          <li>위 금액은 현재가 기준의 예상치이므로 실제 체결 시 오차가 발생할 수 있습니다.</li>
                        </ul>
                      </div>

                      <div className="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                        {[
                          {label:"총 매도 예상 차익 (과세이연)",val:`₩${fmt(totalProfit)}`,color:"#f43f5e"},
                          {label:"예상 매도 수수료 (~0.2%)",    val:`-₩${fmt(Math.round(fee))}`,color:"#64748b"},
                        ].map(x=>(
                          <div key={x.label} className="flex justify-between items-center mb-2.5 text-xs">
                            <span className="text-slate-500 font-bold">{x.label}</span>
                            <span className="font-black" style={{color:x.color}}>{x.val}</span>
                          </div>
                        ))}
                        <div className="border-t border-slate-100 pt-3 mt-1 flex justify-between items-center">
                          <span className="text-sm font-black text-slate-800">매도 후 총 확보 예수금</span>
                          <span className="text-lg font-black" style={{color:'#2563eb'}}>₩{fmt(Math.round(totalSellAmt-fee))}</span>
                        </div>
                      </div>
                    </>
                  )}
                </div>

                <div className="p-4 border-t border-slate-100 flex-shrink-0 bg-white sm:rounded-b-3xl">
                  <button onClick={()=>setShowRebalance(false)}
                    className="w-full py-4 text-white font-black text-sm rounded-2xl transition-colors shadow-md"
                    style={{background:'#1e293b'}}>
                    확인 및 닫기
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
